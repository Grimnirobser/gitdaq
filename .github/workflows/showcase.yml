name: showcase
on:
  schedule:
    - cron: "23 1 * * *"   # daily, 01:23 UTC
  workflow_dispatch:
permissions:
  contents: write
jobs:
  showcase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 showcase.py
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Commit board
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add showcase README.md
          git diff --cached --quiet || git commit -m "chore: refresh GITDAQ-20 board"
          git push
